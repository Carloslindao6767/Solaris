<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilumini | Energia Solar</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonte Google para ficar mais profissional -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">ILUMINI<span>.</span></div>
            <ul>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Cursos</a></li>
                <li><a href="#">Calculadora</a></li>
                <li><a href="#" class="btn-contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Energia que vem do <span class="destaque">Sol</span></h1>
            <p>Economize até 95% na sua conta de luz com tecnologia de ponta.</p>
            <div class="buttons">
                <a href="#" class="btn-main">Ver Painéis</a>
                <a href="#" class="btn-sub">Saiba Mais</a>
            </div>
        </div>
    </section>

    <section class="produtos">
        <h2>Destaques da Loja</h2>
        <div class="grid-produtos">
            <!-- Exemplo de Card de Produto -->
            <div class="card">
                <div class="badge">15% OFF</div>
                <img src="https://flaticon.com" alt="Painel Solar">
                <h3>Painel Luxen 710W</h3>
                <p class="preco">R$ 819,00</p>
                <button class="btn-comprar">Adicionar ao Carrinho</button>
            </div>
            <!-- Você pode repetir esse card para outros produtos -->
        </div>
    </section>
</body>
</html>
