<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilumini | Energia Solar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">ILUMINI<span>.</span></div>
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#solucoes">Soluções</a></li>
                <li><a href="javascript:void(0)" class="btn-contato" onclick="abrirModal()">Solicitar Orçamento</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Energia que vem do <span class="destaque">Sol</span></h1>
            <p>Economize até 95% na conta de luz com o projeto Ilumini.</p>
            <a href="javascript:void(0)" class="btn-main" onclick="abrirModal()">Quero Economizar</a>
        </div>
    </section>

    <!-- JANELA DO FORMULÁRIO (MODAL) -->
    <div id="modalContato" class="modal">
        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            <h2>Solicitar Orçamento</h2>
            <p>Preencha os dados e receba a simulação no seu e-mail.</p>
            
            <!-- CONFIGURADO PARA O SEU E-MAIL -->
            <form action="https://formspree.io/f/carlos-6836124@estudante.rs.gov.br" method="POST">
                <label>Seu Nome:</label>
                <input type="text" name="nome" placeholder="Seu nome completo" required>

                <label>Seu E-mail:</label>
                <input type="email" name="email" placeholder="seu@email.com" required>
                
                <label>Gasto mensal de luz (R$):</label>
                <input type="number" name="gasto_mensal" placeholder="Ex: 350" required>
                
                <button type="submit" class="btn-enviar">Enviar Pedido</button>
            </form>
        </div>
    </div>

    <!-- SCRIPT PARA FUNCIONAMENTO -->
    <script>
        function abrirModal() { 
            document.getElementById("modalContato").style.display = "flex"; 
        }
        function fecharModal() { 
            document.getElementById("modalContato").style.display = "none"; 
        }
        // Fecha se clicar fora da caixa branca
        window.onclick = function(event) {
            let modal = document.getElementById("modalContato");
            if (event.target == modal) { fecharModal(); }
        }
    </script>
</body>
</html>
