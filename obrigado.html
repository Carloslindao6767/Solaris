<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! | Ilumini</title>
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    <style>
        :root {
            --gradiente-azul: linear-gradient(135deg, #003366 0%, #00509d 100%);
            --azul-dark: #011627;
            --amarelo: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            display: flex;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .box {
            background: white;
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            max-width: 480px;
            width: 100%;
            text-align: center;
            position: relative;
            animation: deslizar 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes deslizar {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Animação do Ícone de Sucesso */
        .sucesso-icone {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            color: #2e7d32;
            font-size: 2.2rem;
            font-weight: bold;
            animation: pulso 1.5s infinite ease-in-out;
        }

        @keyframes pulso {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.2); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(46, 125, 50, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); }
        }

        h1 {
            color: var(--azul-dark);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .btn-voltar {
            background: var(--gradiente-azul);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-block;
            width: 100%;
            max-width: 220px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 80, 157, 0.2);
        }

        .btn-voltar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 80, 157, 0.3);
        }

        /* Elementos Decorativos de Fundo (Partículas/Confetes) */
        .decoracao {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.6;
        }
        .dec-1 { background: var(--amarelo); top: 15%; left: 10%; animation: flutuar 3s infinite ease-in-out; }
        .dec-2 { background: #00509d; top: 75%; left: 85%; animation: flutuar 4s infinite ease-in-out 1s; }
        .dec-3 { background: #2e7d32; top: 80%; left: 8%; animation: flutuar 3.5s infinite ease-in-out 0.5s; }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(180deg); }
        }

        /* Ajustes específicos para telas muito pequenas (Celulares antigos) */
        @media (max-width: 400px) {
            .box {
                padding: 35px 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="decoracao dec-1"></div>
        <div class="decoracao dec-2"></div>
        <div class="decoracao dec-3"></div>

        <div class="sucesso-icone">✓</div>
        
        <h1>Pedido Recebido!</h1>
        <p>Agradecemos o seu contato para o nosso projeto escolar. Nossa equipe simulou o seu orçamento e gerou os dados salvos no seu painel.</p>
        
        <a href="index.html" class="btn-voltar">Voltar ao Início</a>
    </div>
</body>
</html>
